[library]
name = "sokol"
link_mode = "static"
abi = "c"

[headers]
entrypoint = "Sokol/sokol_bindings.h"
include_dirs = ["Sokol"]
defines = ["SOKOL_NO_ENTRY"]

[autobinding]
module = "sokol"
output = "../app/sokol.kira"
headers = ["Sokol/sokol_app.h", "Sokol/sokol_gfx.h", "Sokol/sokol_glue.h"]

[bindings]
mode = "all_public"

[build]
sources = ["Sokol/sokol_impl.c"]
include_dirs = ["Sokol"]

[target.aarch64-macos-none]
static_lib = "../generated/native/aarch64-macos/libsokol.a"
defines = ["SOKOL_GLCORE"]
frameworks = ["Foundation", "AppKit", "QuartzCore", "OpenGL"]

[target.aarch64-ios-none]
static_lib = "../generated/native/aarch64-ios/libsokol.a"
defines = ["SOKOL_METAL"]
frameworks = ["Foundation", "UIKit", "QuartzCore", "Metal", "MetalKit"]

[target.aarch64-ios-simulator]
static_lib = "../generated/native/aarch64-ios-simulator/libsokol.a"
defines = ["SOKOL_METAL"]
frameworks = ["Foundation", "UIKit", "QuartzCore", "Metal", "MetalKit"]

[target.aarch64-tvos-none]
static_lib = "../generated/native/aarch64-tvos/libsokol.a"
defines = ["SOKOL_METAL"]
frameworks = ["Foundation", "UIKit", "QuartzCore", "Metal", "MetalKit"]

[target.aarch64-tvos-simulator]
static_lib = "../generated/native/aarch64-tvos-simulator/libsokol.a"
defines = ["SOKOL_METAL"]
frameworks = ["Foundation", "UIKit", "QuartzCore", "Metal", "MetalKit"]

[target.aarch64-xros-none]
static_lib = "../generated/native/aarch64-xros/libsokol.a"
defines = ["SOKOL_METAL"]
frameworks = ["Foundation", "UIKit", "QuartzCore", "Metal", "MetalKit"]

[target.aarch64-xros-simulator]
static_lib = "../generated/native/aarch64-xros-simulator/libsokol.a"
defines = ["SOKOL_METAL"]
frameworks = ["Foundation", "UIKit", "QuartzCore", "Metal", "MetalKit"]

[target.x86_64-linux-gnu]
static_lib = "../generated/native/x86_64-linux-gnu/libsokol.a"
defines = ["SOKOL_GLCORE"]
system_libs = ["X11", "Xi", "Xcursor", "GL", "dl", "pthread", "m"]

[target.x86_64-windows-msvc]
static_lib = "../generated/native/x86_64-windows-msvc/sokol.lib"
defines = ["SOKOL_GLCORE"]
system_libs = ["opengl32"]
